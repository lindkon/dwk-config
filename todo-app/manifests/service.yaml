apiVersion: v1
kind: Service
metadata:
  name: todo-app-svc
spec:
  type: ClusterIP
  selector:
    app: todo-app # This is the app as declared in the deployment.
  ports:
    - port: 80 # This is a port that is available to the cluster, in this case it can be ~ anything
      targetPort: 3001 # This is the target port