apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: image-storage
          persistentVolumeClaim:
            claimName: project-claim
      containers:
        - name: todo-main
          image: lindkon/todo-main
          volumeMounts:
            - name: image-storage
              mountPath: /usr/src/app/files
          resources: 
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            initialDelaySeconds: 10 # Initial delay until the readiness is tested
            periodSeconds: 5 # How often to test
            httpGet:
               path: /healthz
               port: 3001
          livenessProbe:
            initialDelaySeconds: 20 # Initial delay until the liveness is tested
            periodSeconds: 5 # How often to test
            httpGet:
               path: /
               port: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: PORT
            - name: FILES_DIR
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: FILES_DIR
            - name: IMAGE_FILENAME
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: IMAGE_FILENAME
        - name: get-image
          image: lindkon/get-image
          resources: 
            requests:
              memory: "50Mi"
              cpu: "50m"
            limits:
              memory: "100Mi"
              cpu: "100m"
          volumeMounts:
            - name: image-storage
              mountPath: /usr/src/app/files
          env:
            - name: FILES_DIR
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: FILES_DIR
            - name: IMAGE_FILENAME
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: IMAGE_FILENAME
            - name: IMAGE_SOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: IMAGE_SOURCE_URL
            - name: MAX_IMAGE_AGE_MS
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: MAX_IMAGE_AGE_MS
            - name: CHECK_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: CHECK_INTERVAL_MS