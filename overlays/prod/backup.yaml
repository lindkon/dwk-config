apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: db-backup-claim
          containers:
            - name: dump
              image: postgres:18-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  FILE=/backup/todo-$(date +%Y-%m-%d-%H%M%S).sql
                  pg_dump > "$FILE"
                  test -s "$FILE"
                  echo "Backup OK: $(ls -lh "$FILE")"
              envFrom:
                - configMapRef:
                    name: todo-backend-config
                - secretRef:
                    name: todo-secret
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "250m"