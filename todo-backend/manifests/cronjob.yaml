apiVersion: batch/v1
kind: CronJob
metadata:
  name: todo-creator
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: todo-creator
              image: lindkon/todo-backend:4.2d
              command: ["node", "src/addWikiTodo.js"]
              envFrom:
                - configMapRef:
                    name: todo-backend-config
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
          restartPolicy: OnFailure